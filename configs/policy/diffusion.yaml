# Diffusion Policy — single FR3 arm, joint-space
#
# obs_dim    = 14  (7 joint positions + 7 joint velocities)
# action_dim =  7  (joint position targets fed to PositionController)

obs_dim: 14
action_dim: 7
T_obs: 2          # observation context window (steps)
T_pred: 16        # prediction horizon (UNet sequence length)
T_exec: 8         # executed chunk before re-querying the policy

diffusion:
  n_steps: 100            # DDPM training steps
  beta_schedule: cosine   # "cosine" | "linear"
  n_ddim_steps: 10        # inference steps (DDIM)

network:
  down_channels: [256, 512, 1024]   # UNet encoder channel sizes
  time_emb_dim: 256

training:
  lr: 1.0e-4
  batch_size: 256
  n_epochs: 500
